<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick 3 Stats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Sarge's Pick 3 Analyzer</h1>
    </header>

    <nav>
        <a href="index.html">Calculator</a>
        <a href="drawings.html">Drawings</a>
        <a href="stats.html" class="active">Stats</a>
    </nav>

    <main>
        <section id="stats-section">
            <h2>Statistics</h2>

            <div id="filter-bar">
                <div id="filter-draw">
                    <button type="button" class="filter-button active" data-draw="all">All</button>
                    <button type="button" class="filter-button" data-draw="midday">Midday</button>
                    <button type="button" class="filter-button" data-draw="evening">Evening</button>
                    <button type="button" class="filter-button" data-draw="night">Night</button>
                </div>
            </div>

            <p id="stats-empty"></p>

            <div id="digit-frequency">
                <h3>Digit Frequency</h3>
                <p class="stats-subtitle">Hot digits appear most often. Cold digits appear least often.</p>
                <div id="digit-grid"></div>
            </div>

            <div id="top-straight">
                <h3>Top Straight Numbers</h3>
                <div id="straight-list"></div>
            </div>

            <div id="top-box">
                <h3>Top Box Combinations</h3>
                <p class="stats-subtitle">Digits sorted — e.g. "378" and "837" both count as "378".</p>
                <div id="box-list"></div>
            </div>

        </section>
    </main>

    <script src="stats.js"></script>
</body>
</html>
